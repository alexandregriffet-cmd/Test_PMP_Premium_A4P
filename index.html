
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP A4P Premium</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#eef4ff;margin:0;padding:40px}
.container{max-width:900px;margin:auto;background:white;padding:30px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
button{padding:12px 20px;font-size:16px;border-radius:8px;border:none;background:#1d4ed8;color:white;cursor:pointer}
.answers button{display:block;margin:8px 0;width:100%;background:#f1f5ff;color:#111;border:1px solid #c7d2fe}
.answers button:hover{background:#dbe4ff}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<h1>PMP A4P – Profil Mental de Performance</h1>

<div id="intro">
<p>Test de diagnostic mental pour jeunes sportifs.</p>
<button onclick="startTest()">Commencer le test</button>
</div>

<div id="test" class="hidden">
<h3 id="qText"></h3>
<div class="answers">
<button onclick="answer(1)">Pas du tout d'accord</button>
<button onclick="answer(2)">Plutôt pas d'accord</button>
<button onclick="answer(3)">Mitigé</button>
<button onclick="answer(4)">Plutôt d'accord</button>
<button onclick="answer(5)">Tout à fait d'accord</button>
</div>
</div>

<div id="result" class="hidden">
<h2>Résultat</h2>
<p id="scoreText"></p>
</div>

</div>

<script>

const questions=[
"Je reste concentré pendant toute la compétition",
"Je rebondis rapidement après une erreur",
"Je crois en mes capacités même sous pression",
"Je garde mon calme dans les moments importants",
"Je m'engage totalement dans l'effort"
];

let index=0;
let score=0;

function startTest(){
document.getElementById("intro").classList.add("hidden");
document.getElementById("test").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
document.getElementById("qText").innerText=questions[index];
}

function answer(val){
score+=val;
index++;
if(index>=questions.length){
finish();
}else{
showQuestion();
}
}

function finish(){
document.getElementById("test").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("scoreText").innerText="Score mental A4P : "+score;
}

</script>
</body>
</html>
